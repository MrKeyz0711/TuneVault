<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuneVault</title>
    
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TuneVault">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { font-family: 'Inter', system_ui, sans-serif; }
        .song-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .playing { border: 2px solid #22c55e; background: #052e16; }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .drop-zone { border: 2px dashed #4b5563; transition: all 0.3s; }
        .drop-zone.dragover { border-color: #22c55e; background: #052e16; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div id="main-app" class="flex flex-col min-h-screen">
    <!-- HEADER -->
    <header class="bg-zinc-900 border-b border-zinc-800 px-4 py-4 sticky top-0 z-50">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl">🎵</div>
                <h1 class="text-2xl font-bold tracking-tighter">TuneVault</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="exportLibrary()" class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white">📤 Export</button>
                <button onclick="importLibrary()" class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white">📥 Import</button>
                <button onclick="showUploadModal()" class="bg-emerald-500 hover:bg-emerald-600 px-5 py-2.5 rounded-3xl flex items-center gap-2 font-medium text-sm">
                    <span class="text-lg">↑</span> Add Song
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="relative">
            <input 
                id="search-input"
                type="text" 
                placeholder="Search songs or artists..." 
                onkeyup="handleSearch(event)"
                class="w-full bg-zinc-800 text-white placeholder-zinc-400 rounded-3xl px-5 py-3 outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white text-xl">✕</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 p-4 hidden md:flex flex-col">
            <nav class="space-y-1">
                <a onclick="setFilter('all')" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer">📚 Your Library</a>
                <a onclick="setFilter('favorites')" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer">❤️ Favorites</a>
            </nav>
            <button onclick="loadDemoSongs()" class="mt-auto border border-dashed border-zinc-600 hover:border-emerald-500 text-zinc-400 hover:text-emerald-400 py-3 rounded-3xl text-sm">
                🎧 Load Demo Tracks
            </button>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="px-4 pt-6 pb-4">
                <h2 id="page-title" class="text-3xl font-bold">Your Library</h2>
                <p id="page-subtitle" class="text-zinc-400">0 songs</p>
            </div>

            <!-- Desktop Table -->
            <div class="hidden md:block flex-1 overflow-auto px-4">
                <table class="w-full">
                    <thead>
                        <tr class="text-xs text-zinc-400 border-b border-zinc-800">
                            <th class="text-left py-3 w-10">#</th>
                            <th class="text-left py-3">TITLE</th>
                            <th class="text-left py-3">ARTIST</th>
                            <th class="text-right py-3">DURATION</th>
                            <th class="w-10"></th>
                            <th class="w-10"></th>
                        </tr>
                    </thead>
                    <tbody id="song-table-body" class="text-sm"></tbody>
                </table>
            </div>

            <!-- Mobile Cards -->
            <div id="mobile-song-list" class="md:hidden flex-1 overflow-auto px-4 space-y-3 pb-32"></div>

            <div id="empty-state" class="hidden flex-col items-center justify-center flex-1 text-center px-6">
                <div class="text-6xl mb-6 opacity-40">🎵</div>
                <h3 class="text-xl font-medium">No songs found</h3>
                <p class="text-zinc-400 mt-2">Try different search terms</p>
            </div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="player" class="hidden fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 z-50 p-4">
        <div class="flex items-center gap-3">
            <div id="now-art" class="w-12 h-12 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl">🎵</div>
            <div class="flex-1 min-w-0">
                <p id="now-title" class="font-medium truncate"></p>
                <p id="now-artist" class="text-xs text-zinc-400 truncate"></p>
            </div>
            <button onclick="toggleFavoriteInPlayer()" id="player-favorite-btn" class="text-3xl text-zinc-400 hover:text-amber-400">♡</button>
        </div>

        <div class="flex items-center justify-center gap-6 my-4">
            <button onclick="toggleLoop()" id="loop-btn" class="text-2xl text-zinc-400 hover:text-white">🔁</button>
            <button onclick="playPrevious()" class="text-3xl text-zinc-400 hover:text-white">⏮️</button>
            <button onclick="togglePlay()" id="play-pause-btn" class="w-14 h-14 bg-white text-zinc-950 rounded-3xl flex items-center justify-center text-3xl">▶️</button>
            <button onclick="playNext()" class="text-3xl text-zinc-400 hover:text-white">⏭️</button>
        </div>

        <div onclick="seek(event)" class="h-1 bg-zinc-700 rounded-full cursor-pointer relative overflow-hidden">
            <div id="progress-bar" class="h-1 bg-emerald-500 rounded-full w-0 transition-all"></div>
        </div>
    </div>
</div>

<!-- UPLOAD MODAL -->
<div id="upload-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur z-[10000] flex items-end md:items-center justify-center">
    <div class="modal bg-zinc-900 w-full md:max-w-lg md:rounded-3xl rounded-t-3xl p-6 md:p-8">
        <h2 class="text-2xl font-bold mb-6">Add New Song</h2>
        
        <div id="drop-zone" class="drop-zone rounded-3xl p-12 text-center cursor-pointer">
            <div class="text-5xl mb-4">📤</div>
            <p class="font-medium">Drop MP3 or WAV here</p>
            <p class="text-sm text-zinc-400 mt-1">or tap to browse</p>
            <input type="file" id="modal-file-input" accept="audio/*" multiple class="hidden">
        </div>

        <div id="file-info" class="hidden mt-6 space-y-4">
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Title</label>
                <input id="song-title" class="w-full bg-zinc-800 rounded-2xl px-4 py-3 outline-none">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Artist <span class="text-zinc-500">(optional)</span></label>
                <input id="song-artist" class="w-full bg-zinc-800 rounded-2xl px-4 py-3 outline-none">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-8">
            <button onclick="hideUploadModal()" class="py-4 rounded-3xl border border-zinc-700">Cancel</button>
            <button onclick="addCurrentFile()" id="add-btn" class="py-4 rounded-3xl bg-emerald-500 font-semibold" disabled>Add to Library</button>
        </div>
    </div>
</div>

<script>
    let songs = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let currentSong = null;
    let audio = new Audio();
    let currentPlaylist = [];
    let currentIndex = -1;
    let isLooping = false;
    let pendingFile = null;

    let db;
    let dbReady = false;

    // ================== IndexedDB ==================
    const request = indexedDB.open("TuneVaultDB", 1);

    request.onupgradeneeded = (event) => {
        db = event.target.result;
        if (!db.objectStoreNames.contains("songs")) db.createObjectStore("songs", { keyPath: "id" });
    };

    request.onsuccess = (event) => {
        db = event.target.result;
        dbReady = true;
        loadSongsFromDB();
    };

    function saveSongToDB(song) {
        if (!dbReady) return;
        const tx = db.transaction(["songs"], "readwrite");
        tx.objectStore("songs").put(song);
    }

    function deleteSongFromDB(id) {
        if (!dbReady) return;
        const tx = db.transaction(["songs"], "readwrite");
        tx.objectStore("songs").delete(id);
    }

    function loadSongsFromDB() {
        if (!dbReady) return;
        const tx = db.transaction(["songs"], "readonly");
        tx.objectStore("songs").getAll().onsuccess = (e) => {
            songs = e.target.result || [];
            renderSongList();
        };
    }

    // ================== Duration Helper ==================
    function getAudioDuration(file) {
        return new Promise((resolve) => {
            const url = URL.createObjectURL(file);
            const tempAudio = new Audio(url);
            tempAudio.addEventListener('loadedmetadata', () => {
                const min = Math.floor(tempAudio.duration / 60);
                const sec = Math.floor(tempAudio.duration % 60);
                URL.revokeObjectURL(url);
                resolve(`${min}:${sec < 10 ? '0' : ''}${sec}`);
            });
            tempAudio.addEventListener('error', () => resolve("0:00"));
        });
    }

    // ================== Search ==================
    function handleSearch(e) {
        currentSearch = e.target.value.toLowerCase().trim();
        renderSongList();
    }

    function clearSearch() {
        document.getElementById('search-input').value = '';
        currentSearch = '';
        renderSongList();
    }

    // ================== Export & Import ==================
    function exportLibrary() {
        if (songs.length === 0) return alert("Your library is empty!");
        const exportData = { version: "1.0", exportDate: new Date().toISOString(), songCount: songs.length, songs: songs };
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `TuneVault_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importLibrary() {
        if (!confirm("This will REPLACE your current library.\nContinue?")) return;
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    if (!data.songs || !Array.isArray(data.songs)) return alert("Invalid backup file!");
                    const clearTx = db.transaction(["songs"], "readwrite");
                    clearTx.objectStore("songs").clear().onsuccess = () => {
                        songs = data.songs;
                        songs.forEach(song => saveSongToDB(song));
                        renderSongList();
                        alert(`✅ Imported ${songs.length} songs!`);
                    };
                } catch (err) {
                    alert("Failed to import file.");
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // ================== Other Functions (Upload, Player, etc.) ==================
    function showUploadModal() {
        document.getElementById('upload-modal').classList.remove('hidden');
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('add-btn').disabled = true;
        pendingFile = null;
    }

    function hideUploadModal() {
        document.getElementById('upload-modal').classList.add('hidden');
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('modal-file-input');
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(files) {
        if (files.length === 1) handleSelectedFile(files[0]);
        else if (files.length > 1) importAlbum(Array.from(files));
    }

    function handleSelectedFile(file) {
        if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav|m4a|ogg|flac)$/i)) {
            alert("Unsupported file.");
            return;
        }
        pendingFile = file;
        document.getElementById('song-title').value = file.name.replace(/\.[^/.]+$/, "").replace(/[_-]/g, ' ');
        document.getElementById('file-info').classList.remove('hidden');
        document.getElementById('add-btn').disabled = false;
    }

    async function addCurrentFile() {
        if (!pendingFile) return;
        const title = document.getElementById('song-title').value.trim() || "Untitled";
        const artist = document.getElementById('song-artist').value.trim() || "Unknown Artist";
        const duration = await getAudioDuration(pendingFile);

        const reader = new FileReader();
        reader.onload = function(e) {
            const songData = { id: Date.now(), title, artist, duration, data: e.target.result, isFavorite: false };
            songs.unshift(songData);
            saveSongToDB(songData);
            renderSongList();
            hideUploadModal();
            if (songs.length === 1) playSong(songData.id);
        };
        reader.readAsDataURL(pendingFile);
    }

    async function importAlbum(files) {
        for (const file of files) {
            if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav|m4a|ogg|flac)$/i)) continue;
            const duration = await getAudioDuration(file);
            const reader = new FileReader();
            reader.onload = function(e) {
                const songData = {
                    id: Date.now() + Math.random(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    artist: "Imported",
                    duration,
                    data: e.target.result,
                    isFavorite: false
                };
                songs.push(songData);
                saveSongToDB(songData);
                renderSongList();
            };
            reader.readAsDataURL(file);
        }
        hideUploadModal();
    }

    // ================== Player ==================
    function playSong(id) {
        const song = songs.find(s => s.id === id);
        if (!song) return;
        currentSong = song;
        audio.src = song.data;
        audio.play();

        document.getElementById('player').classList.remove('hidden');
        document.getElementById('now-title').textContent = song.title;
        document.getElementById('now-artist').textContent = song.artist;
        document.getElementById('player-favorite-btn').innerHTML = song.isFavorite ? '❤️' : '♡';
        document.getElementById('play-pause-btn').innerHTML = '⏸️';

        currentIndex = currentPlaylist.findIndex(s => s.id === id);
        renderSongList();
    }

    function togglePlay() { if (currentSong) audio.paused ? audio.play() : audio.pause(); }
    function playNext() {
        if (!currentPlaylist.length) return;
        let next = currentIndex + 1;
        if (next >= currentPlaylist.length) next = 0;
        playSong(currentPlaylist[next].id);
    }
    function playPrevious() {
        if (!currentPlaylist.length) return;
        let prev = currentIndex - 1;
        if (prev < 0) prev = currentPlaylist.length - 1;
        playSong(currentPlaylist[prev].id);
    }
    function toggleLoop() {
        isLooping = !isLooping;
        audio.loop = isLooping;
        document.getElementById('loop-btn').style.color = isLooping ? '#22c55e' : '';
    }

    function toggleFavorite(id) {
        const song = songs.find(s => s.id === id);
        if (!song) return;
        song.isFavorite = !song.isFavorite;
        saveSongToDB(song);
        renderSongList();
        if (currentSong?.id === id) document.getElementById('player-favorite-btn').innerHTML = song.isFavorite ? '❤️' : '♡';
    }

    function toggleFavoriteInPlayer() { if (currentSong) toggleFavorite(currentSong.id); }

    function seek(e) {
        if (!audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }

    function deleteSong(id) {
        if (!confirm("Delete this song permanently?")) return;
        songs = songs.filter(s => s.id !== id);
        deleteSongFromDB(id);
        if (currentSong?.id === id) {
            audio.pause();
            document.getElementById('player').classList.add('hidden');
            currentSong = null;
        }
        renderSongList();
    }

    function loadDemoSongs() {
        const demos = [{title: "SoundHelix Song #1", artist: "T. Schürger", duration: "3:45", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"}];
        demos.forEach(d => songs.unshift({ id: Date.now() + Math.random(), ...d, data: d.url, isFavorite: false }));
        renderSongList();
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.getElementById('page-title').textContent = filter === 'all' ? 'Your Library' : 'Favorites';
        renderSongList();
    }

    // ================== Main Render ==================
    function renderSongList() {
        let filtered = songs;

        // Apply search
        if (currentSearch) {
            filtered = filtered.filter(song => 
                song.title.toLowerCase().includes(currentSearch) || 
                song.artist.toLowerCase().includes(currentSearch)
            );
        }

        // Apply filter (All / Favorites)
        if (currentFilter === 'favorites') {
            filtered = filtered.filter(s => s.isFavorite);
        }

        const tbody = document.getElementById('song-table-body');
        const mobileList = document.getElementById('mobile-song-list');
        tbody.innerHTML = '';
        mobileList.innerHTML = '';

        if (filtered.length === 0) {
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('page-subtitle').textContent = currentSearch ? 'No matches' : '0 songs';
            currentPlaylist = [];
            return;
        }

        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('page-subtitle').textContent = `${filtered.length} song${filtered.length !== 1 ? 's' : ''}`;

        filtered.forEach((song, i) => {
            // Desktop
            const tr = document.createElement('tr');
            tr.className = `hover:bg-zinc-800 cursor-pointer ${currentSong?.id === song.id ? 'playing bg-zinc-800' : ''}`;
            tr.innerHTML = `
                <td class="py-4">${i+1}</td>
                <td class="py-4 font-medium">${song.title}</td>
                <td class="py-4 text-zinc-400">${song.artist}</td>
                <td class="py-4 text-right">${song.duration}</td>
                <td class="py-4 text-center"><button onclick="event.stopImmediatePropagation(); toggleFavorite(${song.id})">${song.isFavorite ? '❤️' : '♡'}</button></td>
                <td class="py-4 text-center"><button onclick="event.stopImmediatePropagation(); deleteSong(${song.id})" class="text-red-400">🗑️</button></td>
            `;
            tr.onclick = () => playSong(song.id);
            tbody.appendChild(tr);

            // Mobile
            const card = document.createElement('div');
            card.className = `song-card bg-zinc-900 rounded-3xl p-4 flex gap-4 ${currentSong?.id === song.id ? 'playing' : ''}`;
            card.innerHTML = `
                <div class="w-14 h-14 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-2xl flex items-center justify-center text-4xl flex-shrink-0">🎵</div>
                <div class="flex-1 min-w-0">
                    <p class="font-medium">${song.title}</p>
                    <p class="text-sm text-zinc-400">${song.artist}</p>
                    <p class="text-xs text-emerald-400">${song.duration}</p>
                </div>
                <div class="flex flex-col items-end gap-4">
                    <button onclick="event.stopImmediatePropagation(); toggleFavorite(${song.id})" class="text-2xl">${song.isFavorite ? '❤️' : '♡'}</button>
                    <button onclick="event.stopImmediatePropagation(); deleteSong(${song.id})" class="text-red-400">🗑️</button>
                </div>
            `;
            card.onclick = () => playSong(song.id);
            mobileList.appendChild(card);
        });

        currentPlaylist = filtered;
    }

    // Audio Events
    audio.addEventListener('timeupdate', () => {
        if (audio.duration) document.getElementById('progress-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
    });
    audio.addEventListener('ended', () => { if (!isLooping) playNext(); });
    audio.addEventListener('pause', () => document.getElementById('play-pause-btn').innerHTML = '▶️');
    audio.addEventListener('play', () => document.getElementById('play-pause-btn').innerHTML = '⏸️');

    window.onload = () => console.log("%c✅ TuneVault Ready", "color:#22c55e; font-size:15px");
</script>
</body>
</html>
